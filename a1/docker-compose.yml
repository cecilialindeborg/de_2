version: "3.7"

services:
  spark-master:
    build: .
    container_name: spark-master
    hostname: sparkmaster
    command: >
      sh -c "
      $SPARK_HOME/sbin/start-master.sh &&
      tail -f /dev/null"
    ports:
      - "8080:8080"
      - "7077:7077"

  spark-worker:
    build: .
    container_name: spark-worker
    depends_on:
      - spark-master
    command: >
      sh -c "
      $SPARK_HOME/sbin/start-slave.sh spark://sparkmaster:7077 &&
      tail -f /dev/null"